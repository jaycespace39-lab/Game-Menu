<!-- Save as index.html and open with Live Server in VS Code -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Marvel Rivals Inspired Menu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Rajdhani', sans-serif;
    background:black;
    color:white;
}

/* =========================
   BACKGROUND
========================= */

.bg{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        120deg,
        rgba(255,0,80,0.25),
        rgba(0,140,255,0.25)
    ),

    url("https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920&auto=format&fit=crop")
    center/cover no-repeat;

    animation:bgZoom 18s infinite alternate ease-in-out;
    z-index:-3;
}

@keyframes bgZoom{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

/* DARK OVERLAY */

.overlay{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.85));

    z-index:-2;
}

/* =========================
   TOP BAR
========================= */

.top-bar{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(10px);
}

.logo{
    font-size:2rem;
    font-weight:700;
    letter-spacing:3px;

    color:white;

    text-shadow:
    0 0 10px crimson,
    0 0 20px crimson;
}

.player-info{
    display:flex;
    gap:20px;
    align-items:center;
}

.currency{
    background:rgba(255,255,255,0.08);
    padding:10px 18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
}

/* =========================
   MAIN LAYOUT
========================= */

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;

    height:100vh;
    padding:120px 70px;
}

/* =========================
   LEFT MENU
========================= */

.left-panel{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.menu-btn{

    width:320px;

    padding:20px;

    border:none;

    background:
    linear-gradient(
        90deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.02)
    );

    color:white;

    font-size:1.2rem;
    font-weight:700;

    letter-spacing:2px;

    cursor:pointer;

    border-left:5px solid transparent;

    transition:0.3s;

    position:relative;

    overflow:hidden;

    backdrop-filter:blur(6px);
}

/* BUTTON HOVER */

.menu-btn:hover{

    transform:
    translateX(12px)
    scale(1.02);

    border-left:5px solid #00b7ff;

    background:
    linear-gradient(
        90deg,
        rgba(0,183,255,0.3),
        rgba(255,255,255,0.03)
    );

    box-shadow:
    0 0 25px rgba(0,183,255,0.5);
}

/* ENERGY SWEEP */

.menu-btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
    );

    transition:0.6s;
}

.menu-btn:hover::before{
    left:120%;
}

/* =========================
   CHARACTER PANEL
========================= */

.character-panel{

    width:420px;

    padding:25px;

    border-radius:24px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.02)
    );

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(12px);

    box-shadow:
    0 0 40px rgba(0,0,0,0.5);
}

.character-image{

    width:100%;
    height:500px;

    border-radius:20px;

    background:
    url("https://images.unsplash.com/photo-1531259683007-016a7b628fc3?q=80&w=1200&auto=format&fit=crop")
    center/cover no-repeat;

    position:relative;

    overflow:hidden;
}

/* CHARACTER GLOW */

.character-image::after{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.7),
        transparent
    );
}

.character-name{

    margin-top:20px;

    font-size:2rem;

    font-weight:700;

    letter-spacing:2px;
}

.character-role{

    color:#00b7ff;

    margin-top:5px;

    letter-spacing:2px;
}

/* =========================
   BOTTOM BAR
========================= */

.bottom-bar{

    position:absolute;

    bottom:0;
    left:0;

    width:100%;

    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.7),
        transparent
    );
}

.news{

    font-size:0.95rem;
    color:#bbbbbb;
}

/* PLAY BUTTON */

.play-btn{

    padding:18px 60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        90deg,
        #ff004c,
        #ff4d00
    );

    color:white;

    font-size:1.3rem;

    font-weight:700;

    letter-spacing:3px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 30px rgba(255,0,76,0.5);
}

.play-btn:hover{

    transform:
    scale(1.08);

    box-shadow:
    0 0 50px rgba(255,0,76,0.9);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1000px){

    .main{
        flex-direction:column;
        justify-content:center;
        gap:50px;
    }

    .character-panel{
        width:90%;
    }

    .left-panel{
        width:100%;
        align-items:center;
    }

    .menu-btn{
        width:90%;
    }

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- TOP BAR -->

<div class="top-bar">

    <div class="logo">
        RIVALS
    </div>

    <div class="player-info">

        <div class="currency">
            ⚡ 12,450
        </div>

        <div class="currency">
            💎 780
        </div>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- LEFT MENU -->

    <div class="left-panel">

        <button class="menu-btn" onclick="playClick()">
            PLAY
        </button>

        <button class="menu-btn" onclick="playClick()">
            HEROES
        </button>

        <button class="menu-btn" onclick="playClick()">
            BATTLE PASS
        </button>

        <button class="menu-btn" onclick="playClick()">
            EVENTS
        </button>

        <button class="menu-btn" onclick="playClick()">
            STORE
        </button>

        <button class="menu-btn" onclick="playClick()">
            SETTINGS
        </button>

    </div>

    <!-- CHARACTER PANEL -->

    <div class="character-panel">

        <div class="character-image"></div>

        <div class="character-name">
            SHADOW STRIKER
        </div>

        <div class="character-role">
            DUELIST
        </div>

    </div>

</div>

<!-- BOTTOM BAR -->

<div class="bottom-bar">

    <div class="news">
        NEW EVENT: COSMIC COLLISION LIVE NOW
    </div>

    <button class="play-btn" onclick="startMatch()">
        START MATCH
    </button>

</div>

<!-- AUDIO -->

<audio id="hoverSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

/* =========================
   AUDIO
========================= */

function playClick(){

    const sound =
    document.getElementById("hoverSound");

    sound.currentTime = 0;

    sound.play();
}

/* =========================
   BUTTON ACTION
========================= */

function startMatch(){

    playClick();

    alert("MATCHMAKING...");
}

/* =========================
   PARALLAX EFFECT
========================= */

document.addEventListener("mousemove", (e)=>{

    const x =
    (window.innerWidth / 2 - e.pageX) / 40;

    const y =
    (window.innerHeight / 2 - e.pageY) / 40;

    document.querySelector(".character-panel")
    .style.transform =
    `translate(${x}px, ${y}px)`;

});

/* =========================
   MENU ANIMATION
========================= */

const buttons =
document.querySelectorAll(".menu-btn");

buttons.forEach((btn, index)=>{

    btn.style.opacity = "0";
    btn.style.transform = "translateX(-100px)";

    setTimeout(()=>{

        btn.style.transition = "0.5s";

        btn.style.opacity = "1";

        btn.style.transform = "translateX(0px)";

    }, index * 120);

});

</script>

</body>
</html>
